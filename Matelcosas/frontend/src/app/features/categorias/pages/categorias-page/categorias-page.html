<section class="categorias-section">
  <div class="header">
    <h2>Explora Nuestras Categorías</h2>
    <p>Encuentra todo lo que necesitas en nuestras colecciones destacadas</p>
  </div>

  <!-- LOADING con Skeleton -->
  <div *ngIf="cargando" class="categorias-grid">
    <div *ngFor="let item of [1,2,3,4,5,6,7,8]" class="skeleton-card">
      <p-skeleton width="100%" height="180px" borderRadius="12px"></p-skeleton>
      <div style="padding: 1rem;">
        <p-skeleton width="60%" height="1.5rem" styleClass="mb-2"></p-skeleton>
        <p-skeleton width="100px" height="2rem" borderRadius="8px"></p-skeleton>
      </div>
    </div>
  </div>

  <!-- CARDS de Categorías -->
  <div *ngIf="!cargando" class="categorias-grid">
    <div *ngFor="let categoria of categorias" 
         class="categoria-card" 
         (click)="navegarACategoria(categoria)">
      
      <!-- Contenedor de imagen con tamaño fijo -->
      <div class="imagen-container">
        <img 
          [src]="imageUrl(categoria)" 
          (error)="onImgError($event)" 
          [alt]="categoria.nombre">
        
        <!-- Overlay al hacer hover -->
        <div class="overlay">
          <i class="pi pi-arrow-right"></i>
          <span>Ver productos</span>
        </div>
      </div>

      <!-- Información -->
      <div class="card-info">
        <h3>{{ categoria.nombre }}</h3>
        
        <!-- Botón -->
        <button class="btn-explorar">
          <i class="pi pi-shopping-cart"></i>
          Explorar
        </button>
      </div>
    </div>
  </div>

  <!-- Mensaje si no hay categorías -->
  <div *ngIf="!cargando && categorias.length === 0" class="empty-state">
    <i class="pi pi-inbox"></i>
    <h3>No hay categorías disponibles</h3>
  </div>
</section>
