<section *ngIf="producto" class="detalle-section">
  <div class="detalle-container">
    <!-- 📸 Galería de imágenes -->
    <div class="imagenes">
      <div class="preview">
        <img [src]="selectedImage" alt="{{ producto.nombre }}">
      </div>
      <div class="thumbnails">
        <img
          *ngFor="let img of producto.imagenes"
          [src]="img.startsWith('http') ? img : 'http://localhost:5000/' + img"
          [class.active]="img === selectedImage"
          (click)="selectedImage = img"
        />
      </div>
    </div>

    <!-- 🧾 Información -->
    <div class="info">
      <h2>{{ producto.nombre }}</h2>
      <p class="descripcion">{{ producto.descripcionLarga }}</p>

      <div class="precios">
        <span class="oferta" *ngIf="producto.precioOferta">
          {{ producto.precioOferta | currency:'COP' }}
        </span>
        <span [class.tachado]="producto.precioOferta">
          {{ producto.precioBase | currency:'COP' }}
        </span>
      </div>

      <div *ngIf="producto.variaciones.length" class="variaciones">
        <h4>Variaciones:</h4>
        <button
          *ngFor="let variacion of producto.variaciones"
          [class.active]="selectedVariacion === variacion"
          (click)="seleccionarVariacion(variacion)">
          {{ variacion.nombre }}
        </button>
      </div>

      <div class="stock">
        <span *ngIf="producto.stockTotal > 0">Disponible: {{ producto.stockTotal }}</span>
        <span *ngIf="producto.stockTotal === 0" class="agotado">Agotado</span>
      </div>

      <button class="btn-carrito">Añadir al carrito</button>
    </div>
  </div>
</section>
