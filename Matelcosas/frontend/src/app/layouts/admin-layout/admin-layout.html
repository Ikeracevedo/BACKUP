<!-- Contenedor del estilo del admin activo la barra de navegacion al entrar a la pagina-->
<div class="admin-estilo" [class.sidebar-closed]="!isSidebarOpen">

  <!-- Barra de navegacion superior -->
  <header class="admin-barra-navegacion">
    <div class="navbar-left">
      <button class="menu-toggle" (click)="toggleSidebar()" type="button">
        <span class="desplegable"></span>
        <span class="desplegable"></span>
        <span class="desplegable"></span>
      </button>
      <h1 class="brand">MA-TELCO <span class="admin-badge">Admin</span></h1>
    </div>
    <div class="navbar-right">
      <div class="user-info">
        <span class="user-icon">👤</span>
        <span class="user-name">Administrador</span>
      </div>
      <button class="logout-btn" (click)="logout()" type="button">
        <span class="logout-icon">🚪</span>
        Salir
      </button>
    </div>
  </header>


  <!-- Barra de navegacion lateral -->
  <aside class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-header">
      <h3>Panel de Control</h3>
    </div>

    <nav class="sidebar-nav">
      <button
        *ngFor="let item of menuItems"
        type="button"
        class="nav-item"
        [class.active]="isActive(item.path)"
        (click)="go(item.path)">
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-label">{{ item.label }}</span>
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
